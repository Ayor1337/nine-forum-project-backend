name: Nine-forum-project
services:
  mysql:
    container_name: nine-mysql
#    build:
#      context: ./image/mysql
#      dockerfile: Dockerfile
    image: mysql:latest
    ports:
      - "16033:3306"
    volumes:
      - /docker_volumes/nine_forum/mysql:/var/lib/mysql
    env_file:
      - ./environment/mysql.env
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - forum-project
  redis:
    container_name: nine-redis
    image: redis:latest
    ports:
      - "16379:6379"
    volumes:
      - /docker_volumes/nine_forum/redis:/data
    networks:
      - forum-project
  minio:
    container_name: nine-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /docker_volumes/nine_forum/minio/data:/data
      - /docker_volumes/nine_forum/minio/config:/root/.minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: qwert123
    command: server /data --console-address ":9001"
    networks:
      - forum-project
  rabbitmq:
    container_name: nine-rabbitmq
    image: rabbitmq:management
    volumes:
      - /docker_volumes/nine_forum/rabbitmq:/var/lib/rabbitmq
    networks:
      - forum-project
  elasticsearch:
    container_name: nine-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
    command:
      - /bin/bash
      - -c
      - |
        bin/elasticsearch-plugin list | grep -q '^analysis-ik$' \
          || bin/elasticsearch-plugin install -b https://get.infini.cloud/elasticsearch/analysis-ik/9.2.1
        mkdir -p plugins/analysis-ik/config
        touch plugins/analysis-ik/config/main.dic \
          plugins/analysis-ik/config/stopword.dic \
          plugins/analysis-ik/config/quantifier.dic \
          plugins/analysis-ik/config/surname.dic \
          plugins/analysis-ik/config/suffix.dic \
          plugins/analysis-ik/config/preposition.dic
        printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<!DOCTYPE properties SYSTEM "http://java.sun.com/dtd/properties.dtd">' \
          '<properties>' \
          '  <comment>IK Analyzer 扩展配置</comment>' \
          '  <entry key="ext_dict"></entry>' \
          '  <entry key="ext_stopwords"></entry>' \
          '  <entry key="remote_ext_dict"></entry>' \
          '  <entry key="remote_ext_stopwords"></entry>' \
          '</properties>' \
          > plugins/analysis-ik/config/IKAnalyzer.cfg.xml
        exec /usr/local/bin/docker-entrypoint.sh eswrapper
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g   # 内存根据你机器情况改
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - es_plugins:/usr/share/elasticsearch/plugins
    networks:
      - forum-project
  kibana:
    container_name: nine-kibana
    image: docker.elastic.co/kibana/kibana:9.2.1
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://nine-elasticsearch:9200
    networks:
      - forum-project

volumes:
  es_data:
  es_plugins:


networks:
  forum-project:
